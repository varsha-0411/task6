apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
  labels:
    app: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: red
  template:
    metadata:
      labels:
        app: red
    spec:
      containers:
      - name: my-container
        image: varsha0411/chittiimg:v1
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: ser
spec:
  type: LoadBalancer
  selector:
    app: red
  ports:
    - port: 8080
      targetPort: 8080
